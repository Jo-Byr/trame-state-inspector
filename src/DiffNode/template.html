<div
  class="node"
  :class="classFor(path)"
>
  <div
    class="row"
    :class="{ clickable: !isLeaf(node) }"
    @click="!isLeaf(node) && toggle(path)"
  >
    <span class="arrow">
      {{ isLeaf(node) ? "" : (open() ? "▼" : "▶") }}
    </span>

    <span class="col-name">
      {{ label() }}
    </span>

    <span
      class="col-value"
      :class="isLeaf(node) ? 'type-' + leafType(node) : 'preview'"
    >
      {{ isLeaf(node) ? leafLabel(node) : previewLabel(node) }}
    </span>
  </div>

  <div
    v-if="!isLeaf(node) && open()"
    class="children"
  >
    <DiffNode
      v-for="([key,value]) in entries(node)"
      :key="key"
      :node="value"
      :path="path ? path+'.'+key : key"
      :depth="depth+1"
      :expanded="expanded"
      :toggle="toggle"
      :is-expanded="isExpanded"
      :class-for="classFor"
    />
  </div>
</div>
