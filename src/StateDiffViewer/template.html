<v-card class="diff-card">
  <v-card-title>
    State diff
  </v-card-title>

  <v-divider/>

  <v-card-text class="scroll-area">
    <div class="tree">
      <DiffNode
        v-for="([key, value]) in Object.entries(model)"
        :key="key"
        :node="value"
        :path="key"
        :depth="0"
        :expanded="expanded"
        :toggle="toggle"
        :is-expanded="isExpanded"
        :class-for="classFor"
      />
    </div>
  </v-card-text>
</v-card>
